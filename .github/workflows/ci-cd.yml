name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - Full directory structure
        run: |
          echo "=== Current directory ==="
          pwd
          echo "=== Full file structure ==="
          find . -type f -name "*" | sort
          echo "=== Dockerfile check ==="
          find . -name "Dockerfile" -o -name "dockerfile" -o -name "*.Dockerfile" | head -5
          echo "=== File permissions ==="
          ls -la Dockerfile 2>/dev/null || echo "Dockerfile not found in root"

      - name: Create Dockerfile if missing
        run: |
          if [ ! -f "Dockerfile" ]; then
            echo "Creating Dockerfile..."
            cat > Dockerfile << EOF
FROM nginx:alpine
COPY . /usr/share/nginx/html
EXPOSE 80
EOF
            echo "Dockerfile created:"
            cat Dockerfile
          else
            echo "Dockerfile already exists:"
            cat Dockerfile
          fi

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-app:latest
